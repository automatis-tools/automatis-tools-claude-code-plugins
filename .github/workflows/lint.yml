name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Validate all plugin manifests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for f in */.claude-plugin/plugin.json; do
            echo "Checking $f"
            python3 -c 'import json,sys; json.load(open(sys.argv[1]))' "$f"
            found=$((found + 1))
          done
          if [ "$found" -eq 0 ]; then
            echo "No plugin manifests found"; exit 1
          fi
          echo "OK: $found plugin manifest(s)"

      - name: Verify marketplace plugin sources resolve
        run: |
          python3 <<'PY'
          import json, pathlib, sys
          data = json.load(open('.claude-plugin/marketplace.json'))
          errors = []
          plugins = data.get('plugins', [])
          for p in plugins:
              src = p.get('source', '')
              if not src.startswith('./'):
                  errors.append(f"plugin '{p.get('name')}': source must use './<dir>' form (got {src!r})")
                  continue
              root = pathlib.Path(src[2:])
              if not root.is_dir():
                  errors.append(f"plugin '{p.get('name')}': source dir '{root}' does not exist")
                  continue
              manifest = root / '.claude-plugin' / 'plugin.json'
              if not manifest.is_file():
                  errors.append(f"plugin '{p.get('name')}': missing manifest at '{manifest}'")
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f"OK: {len(plugins)} plugin source(s) verified")
          PY
